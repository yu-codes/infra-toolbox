<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoServer 圖層管理</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#1e2030; --surface:#24273a; --border:#363a4f; --muted:#6e738d; --text:#cad3f5; --accent:#8aadf4; --green:#a6da95; --red:#ed8796; --yellow:#eed49f; }
    html, body { width: 100%; height: 100%; font-family: system-ui, sans-serif; }
    .layout { display: flex; width: 100%; height: 100%; background: var(--bg); }
    /* ── Sidebar ── */
    #sidebar { width: 340px; min-width: 340px; height: 100%; overflow-y: auto; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; color: var(--text); }
    .logo { padding: 18px 18px 14px; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
    .logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; }
    #status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); margin-left: auto; flex-shrink: 0; }
    #status-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #status-dot.err { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .section { padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    /* ── Form ── */
    .field-row { display: flex; gap: 8px; margin-bottom: 7px; }
    .field-group { display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .field-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
    input[type="text"] { width: 100%; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    .btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-accent { background: var(--accent); color: #1e2030; }
    .btn-green  { background: var(--green);  color: #1e2030; }
    .btn-block  { width: 100%; margin-top: 8px; }
    /* ── Dropzone ── */
    .dropzone { border: 2px dashed var(--border); border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .dropzone:hover, .dropzone.drag { border-color: var(--accent); color: var(--accent); }
    .dropzone input { display: none; }
    .dropzone .fname { margin-top: 4px; color: var(--text); font-weight: 500; word-break: break-all; }
    /* ── Workspace chips ── */
    .ws-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .ws-chip { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: var(--bg); color: var(--muted); border: 1px solid var(--border); cursor: pointer; }
    .ws-chip:hover { border-color: var(--accent); color: var(--accent); }
    /* ── Layer List ── */
    .layer-list-wrap { flex: 1; overflow-y: auto; min-height: 0; }
    .layer-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-radius: 8px; }
    .layer-item:hover { background: var(--bg); }
    .layer-info { flex: 1; min-width: 0; }
    .layer-name { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-meta { font-size: 11px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-actions { display: flex; align-items: center; gap: 1px; flex-shrink: 0; padding-top: 1px; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
    .badge-vector { background: #4060a0; color: #8aadf4; }
    .badge-raster { background: #2d5940; color: #a6da95; }
    .badge-on { background: #3a4020; color: var(--yellow); }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 15px; padding: 4px 5px; border-radius: 4px; color: var(--accent); line-height: 1; }
    .icon-btn:hover { background: var(--border); }
    .icon-btn.red   { color: var(--red); }
    .icon-btn.muted { color: var(--muted); }
    .icon-btn.green { color: var(--green); }
    /* ── Map & misc ── */
    #map { flex: 1; width: 100%; height: 100%; }
    #toast-wrap { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border-radius: 8px; padding: 11px 16px; font-size: 13px; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,.5); border-left: 3px solid var(--muted); max-width: 320px; animation: fadeIn .2s ease; }
    .toast.ok  { border-color: var(--green); }
    .toast.err { border-color: var(--red); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; } }
    .empty-hint { font-size: 12px; color: var(--muted); text-align: center; padding: 18px 0; }
    .footer-hint { padding: 10px 18px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); flex-shrink: 0; }
    .footer-hint a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-dot"></div>
      <div>GeoServer 管理<div class="logo-sub">圖層上傳 &amp; 地圖預覽</div></div>
      <div id="status-dot" title="API 連線狀態"></div>
    </div>
    <!-- Workspace -->
    <div class="section">
      <div class="section-title"><i class="bi bi-folder2-open"></i> 工作區</div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="ws-input" placeholder="輸入工作區名稱" value="demo">
        <button class="btn btn-accent" onclick="createWorkspace()">建立</button>
      </div>
      <div class="ws-chips" id="ws-chips"></div>
    </div>
    <!-- Upload SHP ZIP -->
    <div class="section">
      <div class="section-title"><i class="bi bi-file-zip"></i> 上傳 Shapefile ZIP</div>
      <div class="field-row">
        <div class="field-group">
          <div class="field-label">工作區</div>
          <input type="text" id="shp-ws" placeholder="demo" value="demo">
        </div>
        <div class="field-group">
          <div class="field-label">圖層名稱</div>
          <input type="text" id="shp-layer" placeholder="my_layer" oninput="syncStore('shp')">
        </div>
      </div>
      <div class="field-group" style="margin-bottom:7px;">
        <div class="field-label">Store 名稱（留空自動產生）</div>
        <input type="text" id="shp-store" placeholder="my_layer_store">
      </div>
      <div class="dropzone" id="shp-zone" onclick="document.getElementById('shp-file').click()">
        <input type="file" id="shp-file" accept=".zip" onchange="onFileSelect(this,'shp')">
        <i class="bi bi-upload" style="font-size:18px"></i>
        <div class="fname" id="shp-fname">拖放或點擊選擇 .zip</div>
      </div>
      <button class="btn btn-accent btn-block" id="shp-btn" onclick="uploadShp()">
        <i class="bi bi-cloud-upload"></i> 上傳圖層
      </button>
    </div>
    <!-- Upload GeoTIFF -->
    <div class="section">
      <div class="section-title"><i class="bi bi-image"></i> 上傳 GeoTIFF</div>
      <div class="field-row">
        <div class="field-group">
          <div class="field-label">工作區</div>
          <input type="text" id="tiff-ws" placeholder="demo" value="demo">
        </div>
        <div class="field-group">
          <div class="field-label">圖層名稱</div>
          <input type="text" id="tiff-layer" placeholder="my_raster" oninput="syncStore('tiff')">
        </div>
      </div>
      <div class="field-group" style="margin-bottom:7px;">
        <div class="field-label">Store 名稱（留空自動產生）</div>
        <input type="text" id="tiff-store" placeholder="my_raster_store">
      </div>
      <div class="dropzone" id="tiff-zone" onclick="document.getElementById('tiff-file').click()">
        <input type="file" id="tiff-file" accept=".tif,.tiff" onchange="onFileSelect(this,'tiff')">
        <i class="bi bi-upload" style="font-size:18px"></i>
        <div class="fname" id="tiff-fname">拖放或點擊選擇 .tif / .tiff</div>
      </div>
      <button class="btn btn-green btn-block" id="tiff-btn" onclick="uploadTiff()">
        <i class="bi bi-cloud-upload"></i> 上傳圖層
      </button>
    </div>
    <!-- Layer List -->
    <div class="section layer-list-wrap">
      <div class="section-title">
        <i class="bi bi-layers"></i> 圖層列表
        <button class="icon-btn muted" style="margin-left:auto;font-size:13px;" onclick="refreshLayers()" title="重新整理">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
      <div id="layer-list"><div class="empty-hint">點擊 <i class="bi bi-arrow-clockwise"></i> 載入圖層</div></div>
    </div>
    <div class="footer-hint">
      API 文件：<a href="/docs" target="_blank">/docs</a>
      &nbsp;·&nbsp;GeoServer：<a href="http://localhost:8080/geoserver" target="_blank">:8080</a>
    </div>
  </div>
  <!-- Map -->
  <div id="map"></div>
</div>
<div id="toast-wrap"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── Constants & State ────────────────────────────────────────────────────
  const GEO = 'http://localhost:8080/geoserver';
  let map = null;
  /** Layers known to exist on the server: [{workspace, layer, type, store}] */
  let serverLayers = [];
  /** Layers currently rendered on the Leaflet map: key → {wmsLayer, visible, ...} */
  let activeLayers = {};

  // ── Map ──────────────────────────────────────────────────────────────────
  function initMap() {
    if (map) return;
    map = L.map('map', { center: [23.8, 121.0], zoom: 7 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 19
    }).addTo(map);
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  function toast(msg, type = 'ok') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-wrap').appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }

  // ── Health ───────────────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const r = await fetch('/health');
      document.getElementById('status-dot').className = r.ok ? 'ok' : 'err';
    } catch { document.getElementById('status-dot').className = 'err'; }
  }

  // ── Drag-and-drop ────────────────────────────────────────────────────────
  ['shp', 'tiff'].forEach(t => {
    const zone = document.getElementById(`${t}-zone`);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag');
      const f = e.dataTransfer.files[0]; if (!f) return;
      const dt = new DataTransfer(); dt.items.add(f);
      document.getElementById(`${t}-file`).files = dt.files;
      onFileSelect({ files: dt.files }, t);
    });
  });

  function onFileSelect(input, type) {
    const f = input.files[0]; if (!f) return;
    document.getElementById(`${type}-fname`).textContent = f.name;
    const nameEl = document.getElementById(`${type}-layer`);
    if (!nameEl.value) {
      nameEl.value = f.name.replace(/\.(zip|tif|tiff)$/i, '').replace(/[^a-zA-Z0-9_]/g, '_');
      syncStore(type);
    }
  }

  /** Auto-fill store name from layer name; user can still override */
  function syncStore(type) {
    const layer = document.getElementById(`${type}-layer`).value.trim();
    document.getElementById(`${type}-store`).value = layer ? `${layer}_store` : '';
  }

  /** Click a workspace chip to fill all workspace inputs */
  function fillWs(ws) {
    ['ws-input', 'shp-ws', 'tiff-ws'].forEach(id => document.getElementById(id).value = ws);
  }

  // ── Workspace ────────────────────────────────────────────────────────────
  async function createWorkspace() {
    const ws = document.getElementById('ws-input').value.trim();
    if (!ws) return toast('請輸入工作區名稱', 'err');
    const fd = new FormData(); fd.append('workspace', ws);
    try {
      const r = await fetch('/workspaces', { method: 'POST', body: fd });
      const d = await r.json();
      r.ok ? (toast(d.message), loadWorkspaces()) : toast(d.detail || '建立失敗', 'err');
    } catch (e) { toast('錯誤: ' + e.message, 'err'); }
  }

  async function loadWorkspaces() {
    try {
      const d = await fetch('/workspaces').then(r => r.json());
      document.getElementById('ws-chips').innerHTML =
        (d.workspaces || []).map(w =>
          `<span class="ws-chip" onclick="fillWs('${w}')" title="點擊填入工作區">${w}</span>`
        ).join('');
    } catch (e) { console.error('loadWorkspaces:', e); }
  }

  // ── Upload ───────────────────────────────────────────────────────────────
  function safeDetail(text, status) {
    try { return JSON.parse(text).detail || `錯誤 ${status}`; }
    catch { return `上傳失敗: ${status}`; }
  }

  async function uploadShp() {
    const ws    = document.getElementById('shp-ws').value.trim();
    const layer = document.getElementById('shp-layer').value.trim();
    const store = document.getElementById('shp-store').value.trim() || `${layer}_store`;
    const file  = document.getElementById('shp-file').files[0];
    if (!ws || !layer) return toast('請填寫工作區與圖層名稱', 'err');
    if (!file)         return toast('請選擇 ZIP 檔案', 'err');
    setLoading('shp-btn', true);
    const fd = new FormData(); fd.append('layer_name', layer); fd.append('file', file);
    try {
      const r = await fetch(`/workspaces/${ws}/stores/${store}/layers/shp-zip`, { method: 'POST', body: fd });
      const text = await r.text();
      if (!r.ok) { toast(safeDetail(text, r.status), 'err'); return; }
      toast(`✓ ${layer} 上傳成功`);
      addLayerToMap(ws, layer, 'vector', store);
      await refreshLayers();
    } catch (e) { toast('上傳失敗: ' + e.message, 'err'); }
    finally { setLoading('shp-btn', false); }
  }

  async function uploadTiff() {
    const ws    = document.getElementById('tiff-ws').value.trim();
    const layer = document.getElementById('tiff-layer').value.trim();
    const store = document.getElementById('tiff-store').value.trim() || `${layer}_store`;
    const file  = document.getElementById('tiff-file').files[0];
    if (!ws || !layer) return toast('請填寫工作區與圖層名稱', 'err');
    if (!file)         return toast('請選擇 TIFF 檔案', 'err');
    setLoading('tiff-btn', true);
    const fd = new FormData(); fd.append('layer_name', layer); fd.append('file', file);
    try {
      const r = await fetch(`/workspaces/${ws}/stores/${store}/layers/tiff`, { method: 'POST', body: fd });
      const text = await r.text();
      if (!r.ok) { toast(safeDetail(text, r.status), 'err'); return; }
      toast(`✓ ${layer} 上傳成功`);
      addLayerToMap(ws, layer, 'raster', store);
      await refreshLayers();
    } catch (e) { toast('上傳失敗: ' + e.message, 'err'); }
    finally { setLoading('tiff-btn', false); }
  }

  // ── Map Layer Management ─────────────────────────────────────────────────
  /**
   * Explicitly add a layer to the Leaflet map.
   * Called on upload success OR when user clicks "+" in the layer list.
   * refreshLayers() does NOT call this automatically.
   */
  function addLayerToMap(ws, name, type, store) {
    initMap();
    const key = `${ws}:${name}`;
    if (activeLayers[key]) {
      if (!activeLayers[key].visible) toggleVis(key);
      renderLayerList(); return;
    }
    const wmsLayer = L.tileLayer.wms(`${GEO}/${ws}/wms`, {
      layers: `${ws}:${name}`, styles: '', format: 'image/png',
      transparent: true, version: '1.1.0', attribution: '', opacity: 0.85,
    });
    wmsLayer.addTo(map);
    activeLayers[key] = { wmsLayer, visible: true, type, workspace: ws, layer: name, store };
    renderLayerList();
  }

  function removeFromMap(key) {
    const e = activeLayers[key]; if (!e) return;
    map && map.removeLayer(e.wmsLayer);
    delete activeLayers[key];
    renderLayerList();
  }

  function toggleVis(key) {
    const e = activeLayers[key]; if (!e) return;
    if (e.visible) { map.removeLayer(e.wmsLayer); e.visible = false; }
    else           { e.wmsLayer.addTo(map);        e.visible = true; }
    renderLayerList();
  }

  function deleteLayer(ws, name, store) {
    if (!confirm(`刪除「${name}」？\n將從 GeoServer 移除 Layer 與 Store。`)) return;
    const key = `${ws}:${name}`;
    if (activeLayers[key]) { map && map.removeLayer(activeLayers[key].wmsLayer); delete activeLayers[key]; }
    fetch(`/workspaces/${ws}/stores/${store}/layers/${name}/dataset`, { method: 'DELETE' })
      .then(r => r.json())
      .then(d => { toast(d.message || '已刪除'); refreshLayers(); })
      .catch(() => toast('刪除失敗', 'err'));
  }

  // ── Refresh Server Layer List ────────────────────────────────────────────
  /**
   * Fetch the layer catalogue from the server and re-render the sidebar list.
   * Does NOT add anything to the map — user controls map visibility explicitly.
   */
  async function refreshLayers() {
    try {
      const d = await fetch('/layers').then(r => r.json());
      serverLayers = d.layers || [];
      renderLayerList();
    } catch (e) { console.error('refreshLayers:', e); }
  }

  // ── Render Layer List ────────────────────────────────────────────────────
  function renderLayerList() {
    const el = document.getElementById('layer-list');
    if (!serverLayers.length) {
      el.innerHTML = '<div class="empty-hint">尚無圖層，請先上傳或點擊重新整理</div>';
      return;
    }
    el.innerHTML = serverLayers.map(({ workspace: ws, layer, type, store }) => {
      const key    = `${ws}:${layer}`;
      const active = activeLayers[key];
      const badgeCls = type === 'raster' ? 'badge-raster' : 'badge-vector';
      const badgeTxt = type === 'raster' ? 'TIFF' : 'SHP';
      const wmsUrl = `${GEO}/${ws}/wms?SERVICE=WMS&VERSION=1.1.0&REQUEST=GetMap`
        + `&LAYERS=${ws}:${layer}&BBOX=-180,-90,180,90&WIDTH=800&HEIGHT=400`
        + `&SRS=EPSG:4326&FORMAT=image/png&TRANSPARENT=true`;

      let mapBtns;
      if (active) {
        const eyeIcon  = active.visible ? 'bi-eye-fill' : 'bi-eye-slash';
        const eyeClass = active.visible ? 'green' : 'muted';
        mapBtns = `
          <button class="icon-btn ${eyeClass}" onclick="toggleVis('${key}')" title="${active.visible ? '隱藏圖層' : '顯示圖層'}">
            <i class="bi ${eyeIcon}"></i></button>
          <button class="icon-btn muted" onclick="removeFromMap('${key}')" title="從地圖移除">
            <i class="bi bi-x-circle"></i></button>`;
      } else {
        mapBtns = `
          <button class="icon-btn" onclick="addLayerToMap('${ws}','${layer}','${type}','${store}')" title="加入地圖">
            <i class="bi bi-plus-circle"></i></button>`;
      }

      return `<div class="layer-item">
        <div class="layer-info">
          <div class="layer-name">${layer}<span class="badge ${badgeCls}">${badgeTxt}</span>${active ? '<span class="badge badge-on">ON</span>' : ''}</div>
          <div class="layer-meta" title="${ws} / ${store}">${ws} / ${store}</div>
        </div>
        <div class="layer-actions">
          ${mapBtns}
          <a class="icon-btn muted" href="${wmsUrl}" target="_blank" title="預覽 WMS"><i class="bi bi-box-arrow-up-right"></i></a>
          <button class="icon-btn red" onclick="deleteLayer('${ws}','${layer}','${store}')" title="刪除"><i class="bi bi-trash3"></i></button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Button Loading State ─────────────────────────────────────────────────
  function setLoading(id, loading) {
    const btn = document.getElementById(id);
    if (loading) { btn._orig = btn.innerHTML; btn.innerHTML = '⏳ 上傳中…'; btn.disabled = true; }
    else         { btn.innerHTML = btn._orig; btn.disabled = false; }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    initMap();
    checkStatus();
    loadWorkspaces();
    refreshLayers();
    setInterval(checkStatus, 30000);
  });
</script>
</body>
</html>
