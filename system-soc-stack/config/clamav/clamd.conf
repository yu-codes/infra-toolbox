# =============================================================================
# ClamAV Daemon Configuration
# =============================================================================
# Lightweight SOC Stack - clamd.conf

# Logging
LogFile /var/log/clamav/clamd.log
LogFileMaxSize 50M
LogTime yes
LogClean no
LogSyslog no
LogVerbose no
LogRotate yes

# Socket
LocalSocket /run/clamav/clamd.sock
LocalSocketGroup clamav
LocalSocketMode 666
FixStaleSocket yes

# TCP Socket (for network scanning)
TCPSocket 3310
TCPAddr 0.0.0.0

# Scanning
MaxDirectoryRecursion 20
FollowDirectorySymlinks no
FollowFileSymlinks no
CrossFilesystems no

# Limits
MaxScanSize 400M
MaxFileSize 100M
MaxRecursion 16
MaxFiles 10000
MaxEmbeddedPE 40M
MaxHTMLNormalize 40M
MaxHTMLNoTags 2M
MaxScriptNormalize 5M
MaxZipTypeRcg 1M
MaxPartitions 50
MaxIconsPE 200
PCREMatchLimit 10000
PCRERecMatchLimit 5000
PCREMaxFileSize 25M

# Scan options
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanXMLDOCS yes
ScanHWP3 yes
ScanMail yes
ScanPartialMessages no
ScanArchive yes
AlertBrokenExecutables no
AlertEncrypted no
AlertEncryptedArchive no
AlertEncryptedDoc no
AlertOLE2Macros no
AlertPhishingSSLMismatch no
AlertPhishingCloak no
AlertPartitionIntersection no

# Heuristic alerts
HeuristicAlerts yes
HeuristicScanPrecedence no

# Database
DatabaseDirectory /var/lib/clamav
OfficialDatabaseOnly no

# Performance
IdleTimeout 30
ReadTimeout 180
MaxThreads 4
MaxConnectionQueueLength 30

# Self-check (rescan DB every 10 min)
SelfCheck 600

# Exclude paths from scanning
ExcludePath ^/proc/
ExcludePath ^/sys/
ExcludePath ^/dev/
ExcludePath ^/run/
ExcludePath ^/var/lib/clamav/
