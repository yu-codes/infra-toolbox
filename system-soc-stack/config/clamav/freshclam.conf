# =============================================================================
# ClamAV Freshclam Configuration (Virus DB Update)
# =============================================================================

# Database mirror
DatabaseMirror database.clamav.net

# Database directory
DatabaseDirectory /var/lib/clamav

# Update log
UpdateLogFile /var/log/clamav/freshclam.log
LogFileMaxSize 10M
LogTime yes
LogVerbose no
LogSyslog no
LogRotate yes

# Update checks per day (12 = every 2 hours)
Checks 12

# DNS-based database version check
DNSDatabaseInfo current.cvd.clamav.net

# Connection settings
ConnectTimeout 30
ReceiveTimeout 60
MaxAttempts 3

# Notify clamd after update
NotifyClamd /etc/clamav/clamd.conf

# Scripted updates (download bytecode)
ScriptedUpdates yes
CompressLocalDatabase no

# Safety
Bytecode yes
