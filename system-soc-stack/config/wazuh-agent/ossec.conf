<!--
  Wazuh Agent Configuration - ossec.conf
  System SOC Stack - Endpoint agent with ClamAV log monitoring
-->
<ossec_config>

  <!-- Client configuration -->
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- Client buffer -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ======================================================================
       ClamAV Log Monitoring (CRITICAL for SOC integration)
       ====================================================================== -->

  <!-- Primary ClamAV scan log - contains malware detections -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/clamav/scan.log</location>
  </localfile>

  <!-- ClamAV daemon log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/clamav/clamd.log</location>
  </localfile>

  <!-- Freshclam update log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/clamav/freshclam.log</location>
  </localfile>

  <!-- ======================================================================
       Host System Log Monitoring
       ====================================================================== -->

  <!-- Syslog -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/syslog</location>
  </localfile>

  <!-- Auth log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/auth.log</location>
  </localfile>

  <!-- Kernel log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/kern.log</location>
  </localfile>

  <!-- dpkg log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/dpkg.log</location>
  </localfile>

  <!-- Docker daemon log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/host/var/log/docker.log</location>
  </localfile>

  <!-- ======================================================================
       File Integrity Monitoring (FIM)
       ====================================================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Critical system directories -->
    <directories realtime="yes" check_all="yes">/host/etc</directories>
    <directories realtime="yes" check_all="yes">/host/var/log/clamav</directories>

    <!-- Ignore dynamic files -->
    <ignore>/host/etc/mtab</ignore>
    <ignore>/host/etc/resolv.conf</ignore>
    <ignore>/host/etc/hostname</ignore>
    <ignore type="sregex">.*.swp$</ignore>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
  </syscheck>

  <!-- ======================================================================
       Rootcheck
       ====================================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ======================================================================
       System Inventory
       ====================================================================== -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ======================================================================
       Security Configuration Assessment (SCA)
       ====================================================================== -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ======================================================================
       Active Response
       ====================================================================== -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
  </active-response>

  <!-- Logging -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
